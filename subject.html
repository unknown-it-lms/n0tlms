<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Subtopics</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="subjects.js"></script>
</head>
<body>
  <div class="page">
  <button onclick="history.back()">Back</button>
  <h1 id="subject-title"></h1>
  <ul id="subtopic-list"></ul>

  <script>
    const params = new URLSearchParams(window.location.search);
    const subject = params.get("subject");
    document.getElementById("subject-title").textContent = subject;

    const list = document.getElementById("subtopic-list");
    subjects[subject].forEach(subtopic => {
      const li = document.createElement("li");
      const link = document.createElement("a");
      link.href = `subtopic.html?subject=${encodeURIComponent(subject)}&subtopic=${encodeURIComponent(subtopic.name)}`;
      link.textContent = subtopic.name;
      li.appendChild(link);
      list.appendChild(li);
    });
  </script>
  </div>
</body>
</html>
