<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Resources</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="subjects.js"></script>
</head>
<body>
  <div class="page">

  <button onclick="history.back()">Back</button>
  <h1 id="subtopic-title"></h1>
  <div id="resources"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const subject = params.get("subject");
    const subtopicName = params.get("subtopic");
    document.getElementById("subtopic-title").textContent = subtopicName;

    const subtopic = subjects[subject].find(st => st.name === subtopicName);
    const container = document.getElementById("resources");

    if (subtopic.hasNotes && subtopic.notesFile) {
    container.innerHTML += `
        <a href="${subject}/${subtopic.name}/${subtopic.notesFile}" target="_blank">Notes</a><br>`;
    }

    if (subtopic.hasPPT && subtopic.pptFile) {
        container.innerHTML += `
            <a href="${subject}/${subtopic.name}/${subtopic.pptFile}" target="_blank">PPT</a><br>`;
    }

    if (subtopic.hasMCQ) {
      container.innerHTML += `<a href="mcq.html?subject=${encodeURIComponent(subject)}&subtopic=${encodeURIComponent(subtopicName)}">MCQ</a><br>`;
    }
  </script>
  </div>  
</body>
</html>
